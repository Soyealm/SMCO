            } else if (activeTab === 2) { // Documentos Externos
                const rows = data.docExternosData.map(d => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50">
                        <td class="p-3 sm:p-4"><span class="font-bold text-slate-800 whitespace-nowrap">${d.ente}</span><br><span class="text-[10px] font-bold text-slate-400 uppercase whitespace-nowrap">Ref: ${d.ref}</span></td>

            document.getElementById('content-area').innerHTML = `<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-6 min-h-[600px]">${createTabs('INSTRUCCIONES')}${content}</div>`;

        // ==========================================
        // CONTROLADOR PRINCIPAL
        // ==========================================
        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            let html = '';
            
            html += `<div class="px-5 text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 mt-2">Visión General</div>`;
            html += `<div onclick="setModule('DASHBOARD')" class="sidebar-item ${state.currentModule === 'DASHBOARD' ? 'active' : ''} flex items-center px-5 py-3 cursor-pointer transition-all duration-200"><i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i><span class="font-medium text-sm tracking-wide">Dashboard Principal</span></div>`;
            
            html += `<div class="px-5 text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 mt-6">Módulos del Sistema</div>`;
            modules.filter(m => m.type === 'module').forEach(m => {
                html += `<div onclick="setModule('${m.id}')" class="sidebar-item ${state.currentModule === m.id ? 'active' : ''} flex items-center px-5 py-3 cursor-pointer transition-all duration-200"><i data-lucide="${m.icon}" class="w-5 h-5 mr-3"></i><span class="font-medium text-sm tracking-wide">${m.title}</span></div>`;
            });

            nav.innerHTML = html;
            lucide.createIcons();
        }

        function setModule(moduleName) {
            state.currentModule = moduleName;
            
            if(moduleName !== 'PERSONAL') state.personalDetailView = null;

            destroyCharts(); 
            
            renderSidebar();
            const modObj = modules.find(m => m.id === moduleName);
            document.getElementById('header-title').innerText = modObj ? modObj.title.replace(/^[IVX]+\.\s/, '') : moduleName;
            
            document.getElementById('main-scroll-area').scrollTop = 0;

            switch(moduleName) {
                case 'DASHBOARD': renderDashboard(); break;
                case 'PERSONAL': renderPersonal(); break;
                case 'INTELIGENCIA': renderInteligencia(); break;
                case 'OPERACIONES': renderOperaciones(); break;
                case 'LOGISTICA': renderLogistica(); break;
                case 'PLANIFICACION': renderPlanificacion(); break;
                case 'ESTADISTICA': renderEstadistica(); break;
                case 'INSTRUCCIONES': renderInstrucciones(); break;
            }

            // Ocultar sidebar automáticamente en móviles si se selecciona un módulo nuevo
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                if (!sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        }

        function changeTab(moduleName, tabIndex) {
            state.activeTabs[moduleName] = tabIndex;
            state.personalDetailView = null; 
            setModule(moduleName); 
        }

        // Init App
        document.addEventListener('DOMContentLoaded', () => {
            setModule('DASHBOARD');
        });

    </script>
